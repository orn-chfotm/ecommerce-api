# Spring
spring:
  application:
    name: ecommerce
  # H2 Database
  datasource:
    url: jdbc:h2:mem:devDb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # H2 console
  h2:
    console:
      enabled: true
      path: /h2-console
  # Hibernate
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
  # multipart
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# log level
logging:
  level:
    root: INFO
    org:
      springframework:
        security: DEBUG
      hibernate:
        type:
          descriptor:
            sql: TRACE

file:
  upload:
    root-path: C:/Users/EM_NB143/personal/project/ecommerce/upload/file
    limits:
      PRODUCT: 2
    allowed-extensions: [ jpg, jpeg, png, gif, webp, pdf ]

